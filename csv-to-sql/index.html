<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Jack Sleath - CSV to SQL</title>
    <meta name="description" content="Pick a CSV file and generate SQL INSERT statements. Powered by PapaParse." />
    <link rel="stylesheet" href="../styles.css" />
</head>
<body class="page-tool">
    <div class="wrap">
        <header class="site-header">
            <div class="brand">
                <span class="brand-dot" aria-hidden="true"></span>
                <span class="brand-name">Jack Sleath</span>
                <span class="brand-sep" aria-hidden="true">/</span>
                <span class="brand-page">CSV to SQL</span>
            </div>
            <nav class="site-nav" aria-label="Primary">
                <a href="../index.html">Projects</a>
                <a href="../about/">About</a>
            </nav>
        </header>

        <p class="tagline">Pick a CSV file, name a table, and get INSERT statements. PapaParse handles the parsing.</p>

        <hr class="rule" />

        <div class="tool">
            <div class="field">
                <label class="field-label" for="csvFileInput">CSV file</label>
                <input type="file" id="csvFileInput" accept=".csv" />
                <p class="field-hint">CSV should include a header row with column names.</p>
            </div>

            <div class="field">
                <label class="field-label" for="tableNameInput">Table name</label>
                <input type="text" id="tableNameInput" value="local_page_rollout" />
                <p class="field-hint">Target table name for the generated INSERT statements.</p>
            </div>

            <div class="row">
                <button id="generateBtn" class="btn btn-primary" type="button">Generate SQL</button>
                <button id="copyBtn" class="btn ghost" type="button">Copy SQL</button>
                <span id="status" class="status" aria-live="polite"></span>
            </div>

            <div class="field">
                <label class="field-label" for="sqlOutput">SQL INSERT queries</label>
                <textarea id="sqlOutput" readonly placeholder="Generated SQL will appear here..."></textarea>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <script>
        (function () {
            const fileInput = document.getElementById('csvFileInput');
            const tableNameInput = document.getElementById('tableNameInput');
            const generateBtn = document.getElementById('generateBtn');
            const copyBtn = document.getElementById('copyBtn');
            const sqlOutput = document.getElementById('sqlOutput');
            const status = document.getElementById('status');

            function showStatus(message) {
                status.textContent = message;
                if (!message) return;
                setTimeout(() => {
                    if (status.textContent === message) status.textContent = '';
                }, 2500);
            }

            function safeColumn(col) {
                if (/[^a-zA-Z0-9_]/.test(col)) return `"${col.replace(/"/g, '""')}"`;
                return col;
            }

            function generateSQL() {
                if (!fileInput.files.length) {
                    showStatus('Pick a CSV file first.');
                    return;
                }

                const file = fileInput.files[0];
                Papa.parse(file, {
                    header: true,
                    skipEmptyLines: true,
                    complete: function (results) {
                        const data = results.data;
                        if (!data.length) {
                            sqlOutput.value = '';
                            showStatus('No rows parsed from CSV.');
                            return;
                        }

                        const rawTableName = (tableNameInput.value || '').trim();
                        const tableName = rawTableName ? rawTableName : 'local_page_rollout';

                        const columns = Object.keys(data[0]);
                        const safeColumns = columns.map(safeColumn);

                        let sql = `INSERT INTO ${tableName} (${safeColumns.join(', ')}) VALUES\n`;

                        const values = data.map(row => {
                            const rowValues = columns.map(col => {
                                const value = row[col];
                                if (value === undefined || value === null || value === '') return 'NULL';
                                return `'${String(value).replace(/'/g, "''")}'`;
                            });
                            return `(${rowValues.join(', ')})`;
                        });

                        sql += values.join(',\n') + ';';
                        sqlOutput.value = sql;
                        showStatus('Generated SQL.');
                    },
                    error: function (err) {
                        console.error(err);
                        showStatus('Error parsing CSV');
                    }
                });
            }

            async function copySQL() {
                const text = sqlOutput.value.trim();
                if (!text) {
                    showStatus('Nothing to copy yet.');
                    return;
                }

                try {
                    if (navigator.clipboard && navigator.clipboard.writeText) {
                        await navigator.clipboard.writeText(text);
                    } else {
                        sqlOutput.focus();
                        sqlOutput.select();
                        document.execCommand('copy');
                        sqlOutput.setSelectionRange(0, 0);
                    }
                    showStatus('Copied to clipboard.');
                } catch (err) {
                    console.error(err);
                    showStatus('Could not copy.');
                }
            }

            generateBtn.addEventListener('click', generateSQL);
            copyBtn.addEventListener('click', copySQL);

            fileInput.addEventListener('keydown', function (e) {
                if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
                    e.preventDefault();
                    generateSQL();
                }
            });
        })();
    </script>
</body>
</html>
