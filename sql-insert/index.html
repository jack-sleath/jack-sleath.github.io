<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Jack Sleath - SQL Insert Maker</title>
    <meta name="description" content="Paste a SQL result table and turn it into INSERT statements." />
    <link rel="stylesheet" href="../styles.css" />
</head>
<body class="page-tool">
    <div class="wrap">
        <header class="site-header">
            <div class="brand">
                <span class="brand-dot" aria-hidden="true"></span>
                <span class="brand-name">Jack Sleath</span>
                <span class="brand-sep" aria-hidden="true">/</span>
                <span class="brand-page">SQL Insert Maker</span>
            </div>
            <nav class="site-nav" aria-label="Primary">
                <a href="../index.html">Projects</a>
                <a href="../about/">About</a>
            </nav>
        </header>

        <p class="tagline">Paste a SQL result grid (headers and rows) and convert it into INSERT statements.</p>

        <hr class="rule" />

        <div class="tool">
            <div class="field">
                <label class="field-label" for="tableName">Table name</label>
                <input type="text" id="tableName" placeholder="Enter table name..." />
            </div>

            <div class="field">
                <label class="field-label" for="tableData">Results input</label>
                <textarea id="tableData" placeholder="Paste your table data here, including the header row..."></textarea>
            </div>

            <div class="row">
                <button id="convertBtn" class="btn btn-primary" type="button">Convert</button>
                <button id="copyBtn" class="btn ghost" type="button">Copy SQL</button>
                <span id="status" class="status" aria-live="polite"></span>
            </div>

            <div class="field">
                <label class="field-label" for="output">INSERT statements</label>
                <textarea id="output" readonly placeholder="Generated INSERT statements will appear here..."></textarea>
            </div>
        </div>
    </div>

    <script src="js/script.js"></script>
    <script>
        function setStatus(message) {
            const el = document.getElementById('status');
            if (!el) return;
            el.textContent = message;
            if (!message) return;
            setTimeout(() => { if (el.textContent === message) el.textContent = ''; }, 2500);
        }
        window.setStatus = setStatus;

        document.getElementById('convertBtn').addEventListener('click', function () {
            if (typeof ConvertTable === 'function') ConvertTable();
        });
        document.getElementById('copyBtn').addEventListener('click', function () {
            if (typeof CopyInsertStatements === 'function') CopyInsertStatements();
        });
    </script>
</body>
</html>
